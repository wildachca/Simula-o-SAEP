<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Tarefas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">

    <h2 class="mb-4 text-center">Cadastro de Tarefas</h2>

    <select id="usuario" class="form-select mb-3">
      <option value="">Selecione o usuário</option>
    </select>

    <input type="text" id="descricao" class="form-control mb-3" placeholder="Descrição da tarefa">
    <input type="text" id="setor" class="form-control mb-3" placeholder="Setor">

    <select id="prioridade" class="form-select mb-3">
      <option value="">Selecione a prioridade</option>
      <option value="baixa">Baixa</option>
      <option value="media">Média</option>
      <option value="alta">Alta</option>
    </select>

    <button class="btn btn-primary w-100" onclick="criarTarefa()">Cadastrar Tarefa</button>

    <p id="mensagem" class="mt-3 text-center"></p>

  </div>
</div>

<script>
const API = 'http://localhost:3000';

async function carregarUsuarios() {
  const res = await fetch(`${API}/usuarios`);
  const usuarios = await res.json();

  const select = document.getElementById('usuario');
  usuarios.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.text = u.nome;
    select.appendChild(opt);
  });
}

async function criarTarefa() {
  const id_usuario = document.getElementById('usuario').value;
  const descricao = document.getElementById('descricao').value.trim();
  const setor = document.getElementById('setor').value.trim();
  const prioridade = document.getElementById('prioridade').value;
  const msg = document.getElementById('mensagem');

  msg.innerText = "";

  if (!id_usuario || !descricao || !setor || !prioridade) {
    msg.innerText = "Preencha todos os campos";
    msg.className = "text-danger text-center mt-3";
    return;
  }

  const res = await fetch(`${API}/tarefas`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id_usuario, descricao, setor, prioridade })
  });

  if (res.ok) {
    msg.innerText = "Tarefa cadastrada com sucesso";
    msg.className = "text-success text-center mt-3";

    document.getElementById('usuario').value = "";
    document.getElementById('descricao').value = "";
    document.getElementById('setor').value = "";
    document.getElementById('prioridade').value = "";
  } else {
    msg.innerText = "Erro ao cadastrar tarefa";
    msg.className = "text-danger text-center mt-3";
  }
}

window.onload = carregarUsuarios;
</script>

</body>
</html>
