<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerenciamento de Tarefas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  .col-kanban {
    min-height: 300px;
  }
  .tarefa-card {
    cursor: pointer;
    transition: 0.2s;
  }
  .tarefa-card:hover {
    transform: scale(1.02);
  }
</style>

</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Gerenciamento de Tarefas</h2>

  <div class="row g-3">

    <div class="col-md-4">
      <div class="card p-3 bg-warning col-kanban">
        <h5 class="text-center">A Fazer</h5>
        <div id="a-fazer" class="mt-3"></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 bg-info col-kanban">
        <h5 class="text-center">Fazendo</h5>
        <div id="fazendo" class="mt-3"></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 bg-success col-kanban text-white">
        <h5 class="text-center">Pronto</h5>
        <div id="pronto" class="mt-3"></div>
      </div>
    </div>

  </div>
</div>

<!-- Modal de edição -->
<div class="modal fade" id="editarModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Tarefa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <select id="edit-usuario" class="form-select mb-3"></select>
        <input type="text" id="edit-descricao" class="form-control mb-3" placeholder="Descrição">
        <input type="text" id="edit-setor" class="form-control mb-3" placeholder="Setor">
        <select id="edit-prioridade" class="form-select mb-3">
          <option value="baixa">Baixa</option>
          <option value="media">Média</option>
          <option value="alta">Alta</option>
        </select>
        <select id="edit-status" class="form-select mb-3">
          <option value="a fazer">A Fazer</option>
          <option value="fazendo">Fazendo</option>
          <option value="pronto">Pronto</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btnExcluir">Excluir</button>
        <button class="btn btn-primary" id="btnSalvar">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = 'http://localhost:3000';
let tarefas = [];
let usuarios = [];
let tarefaAtual = null;

async function carregarUsuarios() {
  const res = await fetch(`${API}/usuarios`);
  usuarios = await res.json();
  const select = document.getElementById('edit-usuario');
  select.innerHTML = '';
  usuarios.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.id;
    opt.text = u.nome;
    select.appendChild(opt);
  });
}

async function carregarTarefas() {
  const res = await fetch(`${API}/tarefas`);
  tarefas = await res.json();
  renderizarTarefas();
}

function renderizarTarefas() {
  ['a-fazer', 'fazendo', 'pronto'].forEach(id => document.getElementById(id).innerHTML = '');
  tarefas.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card p-2 mb-2 tarefa-card';
    card.innerHTML = `
      <strong>${t.descricao}</strong><br>
      <small>Setor: ${t.setor}</small><br>
      <small>Prioridade: ${t.prioridade}</small><br>
      <small>Usuário: ${t.usuario_nome}</small>
    `;
    card.onclick = () => abrirModal(t);
    if (t.status === 'a fazer') document.getElementById('a-fazer').appendChild(card);
    if (t.status === 'fazendo') document.getElementById('fazendo').appendChild(card);
    if (t.status === 'pronto') document.getElementById('pronto').appendChild(card);
  });
}

function abrirModal(tarefa) {
  tarefaAtual = tarefa;
  document.getElementById('edit-usuario').value = tarefa.id_usuario;
  document.getElementById('edit-descricao').value = tarefa.descricao;
  document.getElementById('edit-setor').value = tarefa.setor;
  document.getElementById('edit-prioridade').value = tarefa.prioridade;
  document.getElementById('edit-status').value = tarefa.status;

  const modal = new bootstrap.Modal(document.getElementById('editarModal'));
  modal.show();
}

document.getElementById('btnSalvar').onclick = async () => {
  const updated = {
    id_usuario: document.getElementById('edit-usuario').value,
    descricao: document.getElementById('edit-descricao').value,
    setor: document.getElementById('edit-setor').value,
    prioridade: document.getElementById('edit-prioridade').value,
    status: document.getElementById('edit-status').value
  };
  await fetch(`${API}/tarefas/${tarefaAtual.id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(updated)
  });
  carregarTarefas();
  bootstrap.Modal.getInstance(document.getElementById('editarModal')).hide();
};

document.getElementById('btnExcluir').onclick = async () => {
  if (confirm('Deseja realmente excluir esta tarefa?')) {
    await fetch(`${API}/tarefas/${tarefaAtual.id}`, { method: 'DELETE' });
    carregarTarefas();
    bootstrap.Modal.getInstance(document.getElementById('editarModal')).hide();
  }
};

window.onload = async () => {
  await carregarUsuarios();
  await carregarTarefas();
};
</script>

</body>
</html>
