<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Usuários</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">

    <h2 class="mb-4 text-center">Cadastro de Usuários</h2>

    <input type="text" id="nome" class="form-control mb-3" placeholder="Nome">
    <input type="email" id="email" class="form-control mb-3" placeholder="Email">

    <button class="btn btn-primary w-100" onclick="criarUsuario()">Cadastrar</button>

    <p id="mensagem" class="mt-3 text-center"></p>

  </div>
</div>

<script>
const API = 'http://localhost:3000';

function validarEmail(email) {
  return /\S+@\S+\.\S+/.test(email);
}

async function criarUsuario() {
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('mensagem');

  msg.innerText = "";

  if (!nome || !email) {
    msg.innerText = "Preencha todos os campos";
    msg.className = "text-danger text-center mt-3";
    return;
  }

  if (!validarEmail(email)) {
    msg.innerText = "Email inválido";
    msg.className = "text-danger text-center mt-3";
    return;
  }

  const res = await fetch(`${API}/usuarios`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome, email })
  });

  if (res.ok) {
    msg.innerText = "Usuário cadastrado com sucesso";
    msg.className = "text-success text-center mt-3";

    document.getElementById('nome').value = "";
    document.getElementById('email').value = "";
  } else {
    msg.innerText = "Erro ao cadastrar";
    msg.className = "text-danger text-center mt-3";
  }
}
</script>

</body>
</html>
